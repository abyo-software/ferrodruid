    "crates/ferrodruid-dict",
    "crates/ferrodruid-segment",
    "crates/ferrodruid-aggregator",
    "crates/ferrodruid-sketches",
    "crates/ferrodruid-search",
    "crates/ferrodruid-query",
    "crates/ferrodruid-sql",
    "crates/ferrodruid-msq",
    "crates/ferrodruid-rest",
    "crates/ferrodruid-broker",
    "crates/ferrodruid-historical",
    "crates/ferrodruid-coordinator",
    "crates/ferrodruid-overlord",
    "crates/ferrodruid-middlemanager",
    "crates/ferrodruid-router",
    "crates/ferrodruid-cluster",
    "crates/ferrodruid-discovery",
    "crates/ferrodruid-deep-storage",
    "crates/ferrodruid-metadata",
    "crates/ferrodruid-metadata-schema",
    "crates/ferrodruid-loadrules",
    "crates/ferrodruid-lookup",
    "crates/ferrodruid-tiered",
    "crates/ferrodruid-ingest-kafka",
    "crates/ferrodruid-ingest-kinesis",
    "crates/ferrodruid-ingest-batch",
    "crates/ferrodruid-ingest-iceberg",
    "crates/ferrodruid-ingest-deltalake",
    "crates/ferrodruid-auth",
    "crates/ferrodruid-authz",
    "crates/ferrodruid-ui",
    "crates/ferrodruid-cli-lib",
    "crates/ferrodruid-import-export",
    "crates/ferrodruid-telemetry",
    "crates/ferrodruid-events",
    "crates/ferrodruid-plugin-rt",
    "crates/ferrodruid-role",
    "crates/ferrodruid-rpc",
    "crates/ferrodruid-marketplace",
    "crates/ferrodruid-compat-check",
    "crates/ferrodruid-logcompat",
    "bins/ferrodruid",
    "bins/ferrodruid-cli",
    "bins/ferrodruid-migrate",
    "bins/ferrodruid-broker",
    "bins/ferrodruid-historical",
    "bins/ferrodruid-coordinator",
    "bins/ferrodruid-router",
    "bins/ferrodruid-overlord",
    "bins/ferrodruid-middlemanager",
