#
# Wave 47-C — Apache Druid 31.0.2 compatibility harness.
#
# Druid 31.x latest patch on Docker Hub is 31.0.2.  Fills the gap
# between v30 and v32 in the live compat matrix.
#
# Host ports use the 31xxx prefix so this stack can run alongside
# v30/v32/v33/v34/v35/v36 without conflict.

services:
  druid:
    build:
      context: .
      dockerfile: Dockerfile.druid.template
      args:
        DRUID_VERSION: 31.0.2
    image: ferrodruid/druid-compat:31.0.2
    ports:
      - "31888:8888"   # Router
      - "31081:8081"   # Coordinator
      - "31082:8082"   # Broker
      - "31083:8083"   # Historical
      - "31090:8090"   # Overlord
      - "31091:8091"   # MiddleManager
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/status/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
