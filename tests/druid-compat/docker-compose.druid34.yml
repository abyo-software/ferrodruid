#
# Wave 47-C — Apache Druid 34.0.0 compatibility harness.
#
# Druid 34.x has only one published patch (34.0.0).  Fills the gap
# between v33 and v35 in the live compat matrix.
#
# Host ports use the 34xxx prefix so this stack can run alongside
# v30/v32/v33/v35/v36 without conflict.

services:
  druid:
    build:
      context: .
      dockerfile: Dockerfile.druid.template
      args:
        DRUID_VERSION: 34.0.0
    image: ferrodruid/druid-compat:34.0.0
    ports:
      - "34888:8888"   # Router
      - "34081:8081"   # Coordinator
      - "34082:8082"   # Broker
      - "34083:8083"   # Historical
      - "34090:8090"   # Overlord
      - "34091:8091"   # MiddleManager
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/status/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
