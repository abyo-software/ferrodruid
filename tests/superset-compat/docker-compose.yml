#
# Wave 33 — Apache Superset 6.x stack for the FerroDruid <-> Superset
# end-to-end test.  Modeled on Superset's official non-dev compose
# (Postgres 17 metadata + Redis 7), trimmed to the three services
# the harness actually needs (no celery worker, no beat, no nginx).
#
# Host port 28088 is mapped to Superset 8088 to avoid colliding with
# Druid's standard router port (8888) and FerroDruid's harness port
# (38888) used elsewhere in the workspace.
#
# All names are namespaced with the `ferrodruid-superset-` prefix so
# this stack is unambiguously distinct from any other Superset stack
# the user may already be running locally.
#
# Networking note: Superset reaches FerroDruid (running on the host)
# via `host.docker.internal` — Docker Desktop on macOS resolves this
# to the host loopback automatically; Linux hosts get the same name
# via the `extra_hosts` entry below.

x-superset-image: &superset-image ferrodruid-superset-with-pydruid:wave33

services:
  ferrodruid-superset-db:
    image: postgres:17
    container_name: ferrodruid-superset-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - ferrodruid-superset-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 5s
      retries: 20

  ferrodruid-superset-redis:
    image: redis:7
    container_name: ferrodruid-superset-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  ferrodruid-superset:
    image: *superset-image
    container_name: ferrodruid-superset
    build:
      context: .
      dockerfile: Dockerfile.superset
    restart: unless-stopped
    ports:
      - "28088:8088"
    environment:
      DATABASE_DIALECT: postgresql
      DATABASE_HOST: ferrodruid-superset-db
      DATABASE_PORT: "5432"
      DATABASE_USER: superset
      DATABASE_PASSWORD: superset
      DATABASE_DB: superset
      DATABASE_URL: postgresql+psycopg2://superset:superset@ferrodruid-superset-db:5432/superset
      REDIS_HOST: ferrodruid-superset-redis
      REDIS_PORT: "6379"
      # Wave 33 reproducible test secret — NOT for production use.
      # Anyone reading this file can derive the FAB session key, so
      # keep this stack on a developer workstation only.
      SUPERSET_SECRET_KEY: ferrodruid-superset-wave33-test-secret-key-not-for-prod
      FLASK_APP: superset.app:create_app()
      PYTHONPATH: /app/pythonpath
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      ferrodruid-superset-db:
        condition: service_healthy
      ferrodruid-superset-redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

volumes:
  ferrodruid-superset-db-data:
