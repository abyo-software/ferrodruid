[package]
name = "ferrodruid-metadata"
version = "1.3.0"
edition = "2024"
license = "BUSL-1.1"
description = "Postgres/MySQL/SQLite metadata store via sqlx for FerroDruid"

[dependencies]
ferrodruid-common = { path = "../ferrodruid-common" }
sqlx.workspace = true
tokio.workspace = true
tracing.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
uuid.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
