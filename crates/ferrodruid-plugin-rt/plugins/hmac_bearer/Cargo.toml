[package]
name = "ferrodruid-plugin-hmac-bearer"
version = "1.0.0"
edition = "2024"
license = "BUSL-1.1"
description = "FerroDruid WASM plugin: HMAC-SHA-256 bearer token authenticator (no capabilities)."
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
# Pure-Rust no_std SHA-256 + HMAC.  `default-features = false` keeps
# the wasm artifact small and avoids the `std::error::Error` impl
# that would otherwise force std into the dependency tree.
sha2 = { version = "0.10", default-features = false }
hmac = { version = "0.12", default-features = false }
# Global allocator for `#![no_std]` wasm32 cdylib.
dlmalloc = { version = "0.2", features = ["global"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"

[workspace]
