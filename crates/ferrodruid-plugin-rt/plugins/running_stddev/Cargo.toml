[package]
name = "ferrodruid-plugin-running-stddev"
version = "1.0.0"
edition = "2024"
license = "BUSL-1.1"
description = "FerroDruid WASM plugin: running standard deviation (Welford's online algorithm)."
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
# Pure-Rust no_std float math — only used for sqrt() because the
# Rust core/std library puts f64::sqrt behind the std feature.  Tiny
# (~few KB) addition to the wasm artifact.
libm = "0.2"
# Global allocator for `#![no_std]` wasm32 cdylib.  Same allocator
# wasi-libc uses internally — battle-tested and adds only a few KB.
dlmalloc = { version = "0.2", features = ["global"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"

# Empty workspace declaration so `cargo build --target wasm32-unknown-unknown`
# in this directory does not get pulled into the parent FerroDruid
# workspace (which would force the wasm target onto every workspace
# member).  Each example plugin is built as a standalone package.
[workspace]
