[package]
name = "ferrodruid-marketplace"
version = "1.5.0"
edition = "2024"
license = "BUSL-1.1"
description = "AWS Marketplace entitlement verification + (future) usage metering for the FerroDruid paid Container product."

[features]
# Default OFF. With the feature OFF the crate builds with NO aws-sdk
# dependency compiled and is fully unit-testable offline (no network,
# no AWS credentials). The single-binary / OSS UX never pulls this in.
default = []
# Compiles the real AWS-backed `RegisterUsage` entitlement verifier and
# the (future) usage-metering hook. Pulls in the official AWS SDK crates
# as optional dependencies activated only by this feature.
marketplace-metering = ["dep:aws-config", "dep:aws-sdk-marketplacemetering"]

[dependencies]
async-trait.workspace = true
thiserror.workspace = true
tracing.workspace = true

# Optional — only compiled when `marketplace-metering` is enabled. The
# `aws` posture (rustls TLS via the repo's reqwest/object_store config)
# is already present in the workspace, so these add the Marketplace
# Metering client + the default credential/region provider chain.
aws-config = { version = "1", optional = true }
aws-sdk-marketplacemetering = { version = "1", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
