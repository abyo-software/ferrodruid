[package]
name = "ferrodruid-msq"
version = "1.4.0"
edition = "2024"
license = "BUSL-1.1"
description = "Multi-Stage Query DAG executor for FerroDruid"

[dependencies]
ferrodruid-common = { path = "../ferrodruid-common" }
ferrodruid-query = { path = "../ferrodruid-query" }
ferrodruid-sql = { path = "../ferrodruid-sql" }
# CL-5: real segment I/O wiring for MSQ Scan / Insert stages.
ferrodruid-deep-storage = { path = "../ferrodruid-deep-storage" }
tokio.workspace = true
tracing.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
# DD R27: unique, exclusively-created spill files (avoids predictable-path
# stale-file reuse in the MSQ on-disk spill path).
tempfile.workspace = true
