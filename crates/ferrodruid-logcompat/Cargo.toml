[package]
name = "ferrodruid-logcompat"
version = "1.4.0"
edition = "2024"
license = "BUSL-1.1"
description = "Static (no-execution) compatibility classifier for Apache Druid broker request logs: parses each logged query through FerroDruid's SQL/native parse+plan path and reports a shape-deduplicated compatibility breakdown."

[[bin]]
name = "ferro-logcompat"
path = "src/main.rs"

[dependencies]
ferrodruid-common = { path = "../ferrodruid-common" }
ferrodruid-query = { path = "../ferrodruid-query" }
ferrodruid-sql = { path = "../ferrodruid-sql" }
serde.workspace = true
serde_json.workspace = true
