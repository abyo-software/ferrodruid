#
# Public CI. Fork-PR-safe by construction: read-only permissions, no
# repository secrets are referenced, and pull_request_target is not used.
# Performance gates run in a private pipeline and are intentionally not
# part of this workflow.

name: CI

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain from rust-toolchain.toml
        run: rustup show
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain from rust-toolchain.toml
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (0 warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain from rust-toolchain.toml
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan working tree with gitleaks
        run: >
          docker run --rm -v "$PWD:/repo"
          zricethezav/gitleaks:v8.24.3
          detect --source /repo --no-git --redact

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency license allowlist (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses

  advisories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Security advisories (cargo-deny; exceptions documented in deny.toml)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
