# cargo-deny >= 0.16 removed the per-license `deny` list — licensing is
# closed-by-default against the `allow` list above, so any GPL/AGPL/SSPL/
# LGPL/EUPL crate that lands in the dependency graph fails the licenses
# check automatically. The previous explicit deny list is preserved as a
# comment for human reference:
#   GPL-2.0[*], GPL-3.0[*], AGPL-1.0[*], AGPL-3.0[*], SSPL-1.0,
#   EUPL-1.1/1.2, LGPL-2.0[*], LGPL-2.1[*], LGPL-3.0[*]

confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
